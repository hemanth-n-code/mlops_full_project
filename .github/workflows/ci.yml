name: MLOps CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 🐍 Set Python version
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    # ⬆️ Upgrade pip
    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    # 📦 Install dependencies
    - name: Install dependencies
      run: pip install -r requirements.txt

    # 📊 Download dataset (IMPORTANT)
    - name: Download dataset
      run: |
        mkdir -p data/raw
        wget -O data/raw/creditcard.csv https://storage.googleapis.com/download.tensorflow.org/data/creditcard.csv

    # 🤖 Train model
    - name: Train model
      run: python src/train.py

    # 📉 Run data drift detection
    - name: Run data drift check
      run: python monitoring/data_drift.py

    # ✅ Verify model created
    - name: Verify model exists
      run: |
        if [ ! -f models/model.pkl ]; then
          echo "Model not created!"
          exit 1
        else
          echo "Model successfully created"
        fi